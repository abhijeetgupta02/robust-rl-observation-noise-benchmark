# Baseline config: DQN on CartPole-v1, evaluated under Gaussian observation noise.
#
# Training uses the CLEAN env (no noise); evaluation uses the noisy wrapper.
# These are starting-point hyperparameters tuned to run on a CPU laptop in a
# few minutes -- not tuned for any headline result.

env:
  id: CartPole-v1
  max_episode_steps: 500

noise:
  type: gaussian
  # Std-dev of additive observation noise applied at evaluation time.
  sigma: 0.1

agent:
  type: dqn
  hidden_sizes: [128, 128]
  gamma: 0.99
  lr: 0.001
  buffer_size: 50000
  batch_size: 64
  learning_starts: 1000
  train_freq: 1
  target_update_interval: 500
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 10000
  max_grad_norm: 10.0

training:
  total_timesteps: 50000
  seed: 42

eval:
  n_episodes: 20
  seed: 123
  # If null, the eval noise sigma falls back to noise.sigma above.
  sigma: null

output:
  model_dir: results/baselines/dqn_cartpole
  model_name: dqn_cartpole.pt
